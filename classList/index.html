<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Como adicionar classes?</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <code class="code">
            <p id="1st">p.className = "bold"</p>
            <p id="2nd">p.className = "bold italic</p>
            <p id="3rd">p.classList.add("italic")</p>
            <p id="4th">p.classList.add("italic", "underline")</p>
            <p id="5th">p.classList.add(...myClasses)</p>
            <p id="6th">p.className = myNewClasses.join(" ")</p>
        </code>
        <script src="./script.js"></script>
    </body>
</html>
