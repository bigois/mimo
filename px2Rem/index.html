<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>px to rem</title>
        <link rel="stylesheet" href="../reset.css">
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <h1>Grocery List</h1>
        <ul>
            <li><span class="item-with-rem">Banana</span></li>
            <li><span class="item-with-rem">Apple</span></li>
            <li><span class="item-without-rem">Orange</span></li>
            <li><span class="item-without-rem">Strawberry</span></li>
        </ul>
        <br>
        <p>To see the difference between px and rem, go to your browser settings and adjust the font size.</p>
        <img src="./demo.png" alt="Chrome settings for adjusting font size" width="600">
        <script src="./script.js"></script>
    </body>
</html>
